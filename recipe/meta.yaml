{% set name = "xwrf" %}
{% set version = "0.0.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/xwrf-{{ version }}.tar.gz
  sha256: d7821a2fc001c009bf80a717decf2504f507365f5e3e159930654c5de0f60923

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools-scm
  run:
    - donfig >=0.6.0
    - pyproj >=2.4.1
    - python >={{ python_min }}
    - xarray >=0.18,!=0.20.0,!=0.20.1

test:
  imports:
    - xwrf
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://xwrf.readthedocs.io
  summary: A lightweight interface for working with the Weather Research and Forecasting (WRF) model output in Xarray.
  dev_url: https://github.com/xarray-contrib/xwrf
  license: Apache-2.0
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - jthielen
    - lpilz
    - kmpaul
